<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In vs Out of Control Sorting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-container {
            min-height: 200px;
            transition: all 0.3s ease;
        }
        .draggable-card {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none;
            user-select: none;
        }
        .draggable-card:active {
            cursor: grabbing;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            background: #f8fafc;
            min-height: 300px;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }
        .font-main { font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-50 font-main p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="bg-[#1e293b] text-white p-6 rounded-t-xl text-center shadow-lg">
            <h1 class="text-xl md:text-2xl font-bold mb-2">Some of these belong to you. Some never did.</h1>
            <p class="text-slate-300 italic">Drag each card to where it truly belongs.</p>
        </div>

        <!-- Main Board -->
        <div class="bg-white border-x border-b border-slate-200 rounded-b-xl p-6 shadow-sm">
            
            <!-- Source Area -->
            <div id="source-container" class="flex justify-center items-center mb-10">
                <div id="active-card-slot" class="w-full max-w-md h-48 flex items-center justify-center border-2 border-slate-100 rounded-xl bg-slate-50 relative">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Targets -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Out of Control -->
                <div id="out-of-control" class="drop-zone p-6 rounded-xl flex flex-col items-center text-center transition-all" ondrop="handleDrop(event, 'out')" ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)">
                    <div class="text-blue-900 font-bold text-lg mb-2">Out of My Control</div>
                    <div class="text-slate-500 text-sm italic mb-4">(Let it go)</div>
                    <div id="count-out" class="text-xs font-semibold text-slate-400 uppercase tracking-widest">0 Items</div>
                </div>

                <!-- In My Control -->
                <div id="in-control" class="drop-zone p-6 rounded-xl flex flex-col items-center text-center transition-all" ondrop="handleDrop(event, 'in')" ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)">
                    <div class="text-blue-900 font-bold text-lg mb-2">In My Control</div>
                    <div class="text-slate-500 text-sm italic mb-4">(I am accountable)</div>
                    <div id="count-in" class="text-xs font-semibold text-slate-400 uppercase tracking-widest">0 Items</div>
                </div>
            </div>
        </div>

        <!-- Completion Message -->
        <div id="completion-ui" class="hidden mt-8 text-center p-8 bg-green-50 border border-green-200 rounded-xl">
            <h2 class="text-2xl font-bold text-green-800 mb-2">Well Done!</h2>
            <p class="text-green-700">You have successfully categorized all scenarios.</p>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">Start Over</button>
        </div>
    </div>

    <!-- Modal for Feedback -->
    <div id="feedback-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-2xl max-w-lg w-full shadow-2xl overflow-hidden transform transition-all">
            <div class="p-8">
                <div id="modal-icon" class="w-12 h-12 rounded-full flex items-center justify-center mb-4">
                    <!-- Icon SVG -->
                </div>
                <h3 id="modal-title" class="text-xl font-bold mb-4"></h3>
                <p id="modal-bold-text" class="text-slate-800 font-bold mb-4"></p>
                <p id="modal-italic-text" class="text-slate-600 italic border-l-4 border-blue-500 pl-4 py-2 bg-blue-50"></p>
                <button onclick="closeModal()" class="mt-8 w-full py-3 bg-[#1e293b] text-white font-bold rounded-xl hover:bg-slate-700 transition shadow-lg">
                    Continue
                </button>
            </div>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, type: 'out', text: "A patient is rude and dismissive from the moment they arrive. By the time they leave you are still replaying what they said.", feedback: "The interaction is not in your control. How long you carry it afterwards is." },
            { id: 2, type: 'out', text: "A patient has been waiting for 45 minutes and is furious. They direct all of their frustration at you personally.", feedback: "The wait is not in your control. How you respond to their frustration is." },
            { id: 3, type: 'out', text: "A patient calls you incompetent in front of a full waiting room.", feedback: "What they say is not in your control. Whether you take the bait is." },
            { id: 4, type: 'out', text: "A patient refuses to follow any of the advice they have been given and keeps returning with the same problem.", feedback: "Their choices are not in your control. How you continue to show up for them is." },
            { id: 5, type: 'out', text: "You handled a difficult interaction really well but the patient still left unhappy.", feedback: "Their feelings are not in your control. The quality of your response was." },
            { id: 6, type: 'out', text: "You are on your fifth difficult interaction of the morning and you can feel your patience wearing thin.", feedback: "The volume of difficult patients is not in your control. Your reset between each one is." },
            { id: 7, type: 'out', text: "A patient shares that they have had a really traumatic experience that explains their behaviour today.", feedback: "Their history is not in your control. Whether it changes how you respond to them is." },
            { id: 8, type: 'out', text: "A patient pushes back repeatedly on a boundary you have set, insisting on an exception.", feedback: "Their pushback is not in your control. Whether the boundary holds is." },
            { id: 9, type: 'out', text: "You are told the system is running two hours behind and patients are already complaining at the desk.", feedback: "The system is not in your control. The tone you set at the desk is." },
            { id: 10, type: 'out', text: "A patient leaves a negative review about their experience that you feel is unfair and inaccurate.", feedback: "Their opinion is not in your control. How you document the interaction accurately and professionally is." },
            { id: 11, type: 'out', text: "A patient is aggressive and you can feel your voice getting faster and louder in response.", feedback: "Their aggression is not in your control. Your tone and pace is." },
            { id: 12, type: 'out', text: "You leave work still thinking about a difficult patient from this morning. You cannot switch off.", feedback: "The interaction is done. Whether you set it down at the river is." }
        ];

        let currentDeck = [...scenarios].sort(() => Math.random() - 0.5);
        let outCount = 0;
        let inCount = 0;
        let activeCard = null;

        function renderNextCard() {
            const container = document.getElementById('active-card-slot');
            container.innerHTML = '';
            
            if (currentDeck.length === 0) {
                container.innerHTML = '<div class="text-slate-400 font-medium">All sorted!</div>';
                document.getElementById('completion-ui').classList.remove('hidden');
                return;
            }

            activeCard = currentDeck[0];
            const cardEl = document.createElement('div');
            cardEl.className = 'draggable-card w-full h-full bg-white shadow-xl border border-slate-200 rounded-xl p-6 flex items-center justify-center text-center font-bold text-slate-800';
            cardEl.draggable = true;
            cardEl.innerText = activeCard.text;
            cardEl.id = "card-" + activeCard.id;
            
            cardEl.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', activeCard.id);
            });

            // Touch Support for mobile
            cardEl.addEventListener('touchstart', handleTouchStart, {passive: false});
            cardEl.addEventListener('touchmove', handleTouchMove, {passive: false});
            cardEl.addEventListener('touchend', handleTouchEnd, {passive: false});

            container.appendChild(cardEl);
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(ev, zoneType) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            processChoice(zoneType);
        }

        function processChoice(zoneType) {
            // In this specific exercise, all cards are "Out of Control" actions, 
            // but the prompt is asking to acknowledge they are NOT in control.
            // Based on the user prompt: all 12 items are examples of things NOT in control.
            
            if (zoneType === 'out') {
                showFeedback(activeCard);
                outCount++;
                document.getElementById('count-out').innerText = `${outCount} Items`;
                currentDeck.shift();
                renderNextCard();
            } else {
                // Shake effect for wrong zone
                const slot = document.getElementById('active-card-slot');
                slot.classList.add('animate-bounce');
                setTimeout(() => slot.classList.remove('animate-bounce'), 500);
            }
        }

        function showFeedback(card) {
            document.getElementById('modal-title').innerText = "Perspective Shift";
            document.getElementById('modal-bold-text').innerText = card.text;
            document.getElementById('modal-italic-text').innerText = card.feedback;
            
            const icon = document.getElementById('modal-icon');
            icon.className = "w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-blue-100 text-blue-600";
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
            
            document.getElementById('feedback-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('feedback-modal').classList.add('hidden');
        }

        // Simple Touch Implementation
        let touchStartX, touchStartY;
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }
        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const card = e.target;
            card.style.position = 'fixed';
            card.style.width = '300px';
            card.style.left = (touch.clientX - 150) + 'px';
            card.style.top = (touch.clientY - 50) + 'px';
            card.style.zIndex = 1000;
        }
        function handleTouchEnd(e) {
            const card = e.target;
            const touch = e.changedTouches[0];
            const outZone = document.getElementById('out-of-control').getBoundingClientRect();
            const inZone = document.getElementById('in-control').getBoundingClientRect();

            card.style.position = 'static';
            card.style.zIndex = 1;

            if (touch.clientX > outZone.left && touch.clientX < outZone.right && touch.clientY > outZone.top && touch.clientY < outZone.bottom) {
                processChoice('out');
            } else if (touch.clientX > inZone.left && touch.clientX < inZone.right && touch.clientY > inZone.top && touch.clientY < inZone.bottom) {
                processChoice('in');
            } else {
                renderNextCard(); // Snap back
            }
        }

        window.onload = renderNextCard;
    </script>
</body>
</html>
